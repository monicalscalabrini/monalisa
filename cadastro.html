<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - Monalisa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<header class="navbar">
    <div class="logo">
        <a href="index.html">Monalisa</a>
    </div>
</header>

<div class="login-container">
    <div class="login-box">
        <h2>Criar Conta</h2>

        <input type="text" id="nome" placeholder="Seu nome">
        <input type="email" id="email" placeholder="Seu email">
        <input type="password" id="senha" placeholder="Sua senha">

        <button onclick="cadastrar()" class="btn-primary">Cadastrar</button>

        <p>Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
</div>

<!-- SCRIPT LOCAL GARANTIDO -->
<script>
function cadastrar() {
    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if (!nome || !email || !senha) {
        alert("Preencha todos os campos!");
        return;
    }

    const usuario = {
        nome,
        email,
        senha,
        logado: false
    };

    localStorage.setItem("usuario", JSON.stringify(usuario));

    alert("Conta criada com sucesso!");

    window.location.href = "login.html";
}
</script>

<!-- SEU SCRIPT PRINCIPAL (opcional) -->
<script src="js/script.js"></script>

</body>
</html>
